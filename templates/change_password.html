<!DOCTYPE html>
<html>
<head>
  <title>Change Password</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    form {
      margin-top: 100px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 220px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #0095f6;
      color: white;
      border: none;
      padding: 10px;
      width: 240px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Change Password</h2>

<form method="POST">
  <input name="old_password" type="password" placeholder="Old Password" required><br>
  <input name="new_password" type="password" placeholder="New Password" required><br><br>

  <button type="submit">Update Password</button>
</form>

</body>
</html>
